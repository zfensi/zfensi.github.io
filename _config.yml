title: zfensi 个人博客
description: 记录技术、运营、出海观察与个人思考的中文博客。
theme: minima
lang: zh-CN
locale: zh_CN
url: https://zfensi.github.io
baseurl: ""
author: zfensi
timezone: Asia/Shanghai
show_excerpts: true
permalink: /:year/:month/:day/:title/
logo: /assets/favicon.png

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

feed:
  path: feed.xml

paginate: 6
paginate_path: "/page/:num/"

defaults:
  - scope:
      path: ""
    values:
      image: /assets/site-cover.svg
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: zfensi

webmaster_verifications:
  google: google6744b17961dad095.html

navigation:
  - title: 首页
    url: /
  - title: 分类
    url: /categories/
  - title: 标签
    url: /tags/
  - title: 归档
    url: /archive/
  - title: 关于
    url: /about/
  - title: RSS
    url: /feed.xml
